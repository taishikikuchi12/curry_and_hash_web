<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレーとハッシュドビーフを見分けるAI</title>
    <style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 20px 0;
        box-sizing: border-box;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 320px;
        text-align: center;
    }

    h1 {
        margin: 50px 0 5px 0;
        font-size: 15px;
    }

    img {
        width: 100%;
        border-radius: 15px;
        margin-top: 15px;
    }

    button {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        background: #007aff;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #005fcc;
    }

    .secondary {
        background: #e5e5ea;
        color: black;
    }

    .secondary:hover {
        background: #d1d1d6;
    }

    #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }

    input[type="file"] {
        display: none;
    }

    .upload-btn {
        background: #34c759;
    }

    .upload-btn:hover {
        background: #28a745;
    }
    /* ローディングスピナー */
    .spinner {
        display: none;
        margin: 15px auto;
        width: 40px;
        height: 40px;
        border: 4px solid #e5e5ea;
        border-top: 4px solid #007aff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    /* スマホ用調整 */
    @media (max-width: 600px) {
        body {
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            padding: 12px 0 24px;
        }

        .container {
            margin-top: 0;
            width: 90%;
            padding: 20px;
        }

        h1 {
            margin: 25px 0 5px 0;
            font-size: 26px;
        }

        button {
            font-size: 18px;
            padding: 5px;
        }

        #result {
            font-size: 20px;
        }
    }
    </style>
    
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.ico" />
</head>

<body>

<div class="container">

<h1>カレーとハッシュドビーフを見分けるAI</h1>
<p>隠しクラスもあるよ❤️。ヒントは日本の山</p>

<input type="file" id="file" accept="image/*" capture="environment" onchange="previewImage()">

<button onclick="document.getElementById('file').click()" class="upload-btn">📷 撮影 / 選択</button>
<button onclick="openGallery()" class="secondary">📁 アルバムから選択</button>

<img id="preview" src="" alt="" style="display:none; margin-top:10px;">

<button onclick="upload()">判定する</button>

<div id="loading" class="spinner"></div>
<div id="result"></div>

</div>

    <script>
        function openGallery() {
            const input = document.getElementById("file");
            input.removeAttribute("capture");
            input.click();
        }

        function previewImage() {
            const input = document.getElementById("file");
            const file = input.files[0];
            const preview = document.getElementById("preview");
            const container = document.querySelector(".container");
            const uploadButton = document.querySelector("button[onclick='upload()']");

            if (file) {
                preview.remove();
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";

                // ボタンの位置に移動
                uploadButton.parentNode.insertBefore(preview, uploadButton);

                // 画像追加後に下の判定エリアがしっかり見える位置までスクロール
                setTimeout(() => {
                    uploadButton.scrollIntoView({
                        behavior: "smooth",
                        block: "end"
                    });
                }, 200);
            }

            // 次回はカメラに戻す
            input.setAttribute("capture", "environment");
        }

        async function upload() {
            const file = document.getElementById("file").files[0];
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");
            const container = document.querySelector(".container");

            if (!file) {
                alert("画像を選択してください");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            loading.style.display = "block";
            result.innerText = "";

            try {
                const res = await fetch("https://curryandhashai-production.up.railway.app/predict", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const data = await res.json();

                result.innerText =
                    `結果: ${data.prediction}（信頼度: ${(data.confidence * 100).toFixed(1)}%）`;

                setTimeout(() => {
                    const top = container.getBoundingClientRect().top + window.scrollY - 12;
                    window.scrollTo({
                        top,
                        behavior: "smooth"
                    });
                }, 100);
            } catch (error) {
                result.innerText = "エラーが発生しました";
                console.error(error);
            } finally {
                loading.style.display = "none";
            }
        }
    </script>

</body>

</html>
