<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AI判定アプリ</title>
    <style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 320px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 22px;
    }

    img {
        width: 100%;
        border-radius: 15px;
        margin-top: 15px;
    }

    button {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        background: #007aff;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #005fcc;
    }

    .secondary {
        background: #e5e5ea;
        color: black;
    }

    .secondary:hover {
        background: #d1d1d6;
    }

    #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }

    input[type="file"] {
        display: none;
    }

    .upload-btn {
        background: #34c759;
    }

    .upload-btn:hover {
        background: #28a745;
    }
    </style>
    
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.ico" />
</head>

<body>

<div class="container">

<h1>🍛 AI判定</h1>

<input type="file" id="file" accept="image/*" capture="environment" onchange="previewImage()">

<button onclick="document.getElementById('file').click()" class="upload-btn">📷 撮影 / 選択</button>
<button onclick="openGallery()" class="secondary">📁 アルバムから選択</button>

<img id="preview" src="" alt="" style="display:none;">

<button onclick="upload()">判定する</button>

<div id="result"></div>

</div>

    <script>
        function openGallery() {
            const input = document.getElementById("file");
            input.removeAttribute("capture");
            input.click();
        }

        function previewImage() {
            const input = document.getElementById("file");
            const file = input.files[0];
            const preview = document.getElementById("preview");

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }

            // 次回はカメラに戻す
            input.setAttribute("capture", "environment");
        }

        async function upload() {
            const file = document.getElementById("file").files[0];

            if (!file) {
                alert("画像を選択してください");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            const res = await fetch("https://curryandhashai-production.up.railway.app/predict", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            document.getElementById("result").innerText =
                `結果: ${data.prediction}（信頼度: ${(data.confidence * 100).toFixed(1)}%）`;
        }
    </script>

</body>

</html>
